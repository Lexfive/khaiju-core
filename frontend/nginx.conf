# ════════════════════════════════════════════════════════════
# NGINX Configuration - Khaiju VPS Production
# ════════════════════════════════════════════════════════════
# 
# Configuração otimizada para VPS rodando atrás de proxy reverso
# Compatível com NGINX/Traefik/Caddy como proxy principal
#
# ════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;
    
    # Tamanho máximo de upload
    client_max_body_size 10M;
    
    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ══════════════════════════════════════════════════════════
    # 📁 Serve Frontend Build (React SPA)
    # ══════════════════════════════════════════════════════════
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Headers de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Cache control para HTML (sem cache)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # ══════════════════════════════════════════════════════════
    # 🔌 Proxy para Backend API
    # ══════════════════════════════════════════════════════════
    location /api {
        # Remove /api do path antes de enviar para backend
        rewrite ^/api/(.*) /$1 break;
        
        # Proxy para container backend
        proxy_pass http://backend:3001;
        
        # HTTP version
        proxy_http_version 1.1;
        
        # Headers de proxy reverso
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (caso necessário no futuro)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ══════════════════════════════════════════════════════════
    # 📦 Cache Estático (Assets)
    # ══════════════════════════════════════════════════════════
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|otf)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location ~* \.(css|js)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ══════════════════════════════════════════════════════════
    # 🔒 Segurança
    # ══════════════════════════════════════════════════════════
    
    # Bloquear acesso a arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Bloquear acesso a arquivos de backup
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ══════════════════════════════════════════════════════════
    # 📊 Logs
    # ══════════════════════════════════════════════════════════
    access_log /var/log/nginx/khaiju_access.log;
    error_log /var/log/nginx/khaiju_error.log warn;

    # ══════════════════════════════════════════════════════════
    # ⚡ Gzip Compression
    # ══════════════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
}
