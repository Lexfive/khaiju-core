# ════════════════════════════════════════════════════════════
# Configuração NGINX para Khaiju
# Adicionar ao NGINX existente da VPS
# ════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────
# OPÇÃO 1: Subdomínio (Recomendado)
# ──────────────────────────────────────────────────────────────
# Arquivo: /etc/nginx/sites-available/khaiju

server {
    listen 80;
    server_name khaiju.seudominio.com;  # ← Alterar para seu domínio

    access_log /var/log/nginx/khaiju_access.log;
    error_log /var/log/nginx/khaiju_error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

# ──────────────────────────────────────────────────────────────
# OPÇÃO 2: Subpath (se não tiver domínio próprio)
# ──────────────────────────────────────────────────────────────
# Adicionar ao server block existente

location /khaiju {
    rewrite ^/khaiju(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /khaiju;
}

# ──────────────────────────────────────────────────────────────
# COMANDOS PARA APLICAR
# ──────────────────────────────────────────────────────────────

# 1. Criar arquivo de configuração (OPÇÃO 1 - Subdomínio)
sudo nano /etc/nginx/sites-available/khaiju
# (Colar conteúdo da OPÇÃO 1 acima)

# 2. Ativar site
sudo ln -s /etc/nginx/sites-available/khaiju /etc/nginx/sites-enabled/

# 3. Testar configuração
sudo nginx -t

# 4. Recarregar NGINX
sudo systemctl reload nginx

# 5. Verificar status
sudo systemctl status nginx

# ──────────────────────────────────────────────────────────────
# PARA HTTPS (Let's Encrypt)
# ──────────────────────────────────────────────────────────────

# Instalar Certbot (se não tiver)
sudo apt update
sudo apt install certbot python3-certbot-nginx -y

# Obter certificado SSL
sudo certbot --nginx -d khaiju.seudominio.com

# Auto-renovação já está configurada automaticamente

# ──────────────────────────────────────────────────────────────
# TROUBLESHOOTING
# ──────────────────────────────────────────────────────────────

# Ver logs do NGINX
sudo tail -f /var/log/nginx/khaiju_error.log

# Testar conexão local
curl http://localhost:8080

# Ver containers
docker ps | grep khaiju

# Ver logs do Khaiju
cd /opt/khaiju
docker-compose -f docker-compose.vps.yml logs -f frontend
